apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-colaborador
  namespace: peopleportal
  labels:
    app: frontend-colaborador
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-colaborador
  template:
    metadata:
      labels:
        app: frontend-colaborador
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: nginx
          image: ghcr.io/bryanjosue17/peopleportal-frontend-colaborador:develop
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
